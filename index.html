    <!-- Theme Initialization -->
    <script>
      (() => {
        const root = document.documentElement
        const theme = localStorage.getItem('vscode-theme')
        const layout = localStorage.getItem('vscode-layout')
        const allowedThemes = ['dark', 'light', 'highContrast']
        const allowedLayouts = ['comfortable', 'compact']
        if (allowedThemes.includes(theme)) root.classList.add(`theme-${theme}`)
        if (allowedLayouts.includes(layout)) root.classList.add(`layout-${layout}`)
      })()
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
